# Application configuration
spring.application.name=${SPRING_APP_NAME:bank-app-api}
server.port=${SPRING_APP_PORT:8080}

# Security configuration
logging.level.org.springframework.security=${SPRING_SECURITY_LOG_LEVEL:DEBUG}
spring.security.user.name=none
spring.security.user.password=none

# MySQL database configuration
spring.datasource.url=jdbc:mysql://${DATABASE_HOST:localhost}:${DATABASE_PORT:3306}/${DATABASE_NAME:bank}
spring.datasource.username=${DATABASE_USER:root}
spring.datasource.password=${DATABASE_PASSWORD:root}

# JPA configuration
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=${HIBERNATE_FORMAT_SQL:true}